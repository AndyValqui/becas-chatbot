<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Virtual de Becas</title>

<style>

body{
background:#f3f5f7;
font-family:Arial,Helvetica,sans-serif;
margin:0;
padding:40px;
}

.chat{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0px 0px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0056b3;
}

.bot{
background:#eef4ff;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
margin-top:15px;
width:100%;
padding:15px;
background:#0056b3;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#003d80;
}

</style>

</head>

<body>

<div class="chat">

<h1>🎓 Asistente Virtual de Becas</h1>

<div class="bot">

👋 Hola.

Soy el asistente virtual.

Próximamente podré responder consultas sobre:

<ul>

<li>Activación de beneficios</li>

<li>Renovación</li>

<li>Cronogramas</li>

<li>Requisitos</li>

<li>Preguntas frecuentes</li>

</ul>

</div>

<input
type="text"
placeholder="Escribe aquí tu consulta...">

<button>

Enviar

</button>

</div>

</body>

</html>
